server:
  host: "0.0.0.0"
  port: 8282

llm:
  provider: "litellm"
  model: "gpt-5-mini"
  api_key: ""          # 由 AGX_LLM_API_KEY 环境变量注入
  base_url: ""         # 由 AGX_LLM_BASE_URL 环境变量注入
  temperature: 0.7

prompts:
  version: "v4"

chunking:
  strategy: "recursive"
  chunk_size: 3000
  chunk_overlap: 200
  max_single_pass_tokens: 3000
  map_concurrency: 4
  max_reduce_rounds: 3

intent:
  mode: "rule"

domains:
  default: "email"

modality:
  liteparse_enabled: true
  code_max_chars: 8000
  document_max_chars: 12000
  max_images: 5

batch:
  batch_concurrency: 4
  queue_max: 100
  inline_max_concurrency: 2
  provider_rpm_limit: 60
  provider_tpm_limit: 120000
  avg_call_seconds: 3.0
  output_budget_tokens: 512
  reduce_fan_in: 8

multidoc:
  sync_max_docs: 5
  sync_max_calls: 20
  per_doc_summary_max_tokens: 800

agentic:
  layered_resolver: false
  skill_authoring: false
  personalization_max_chars: 400
  frozen_dir: "prompts/frozen"

overflow:
  max_input_tokens: 120000
  max_chunks: 50

judge_llm:
  provider: "litellm"
  model: "gpt-5-mini"
  api_key: ""
  base_url: ""
  temperature: 0.0
