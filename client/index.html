<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AgenticX LongText Summarizer</title>
    <meta name="description" content="基于 AgenticX 框架的智能长文本摘要平台，支持邮件、新闻等多场景，提供 Map-Reduce 并行处理与多文档聚合能力。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Only inject analytics when env vars are properly set (not raw placeholders)
      (function() {
        var endpoint = '%VITE_ANALYTICS_ENDPOINT%';
        var siteId = '%VITE_ANALYTICS_WEBSITE_ID%';
        if (endpoint && !endpoint.startsWith('%') && siteId && !siteId.startsWith('%')) {
          var s = document.createElement('script');
          s.defer = true;
          s.src = endpoint + '/umami';
          s.setAttribute('data-website-id', siteId);
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>
</html>
